name: Build and Test
run-name: ${{ github.actor }} is building ProfileSite
on: [push, pull_request]
jobs:
  commitlint:
    runs-on: ubuntu-latest
    env:
      working-directory: ./solthoth
    defaults:
      run:
        working-directory: ${{ env.working-directory }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install commitlint dependencies
        run: npm ci
      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
      - name: Validate current commit (push)
        if: github.event_name == 'push'
        run: npx commitlint --from HEAD~1 --to HEAD --verbose

  prettier:
    runs-on: ubuntu-latest
    env:
      working-directory: ./solthoth
    defaults:
      run:
        working-directory: ${{ env.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Check code formatting with Prettier
        run: npm run format:check

  build:
    runs-on: ubuntu-latest
    needs: [commitlint, prettier]
    env:
      working-directory: ./solthoth
    defaults:
      run:
        working-directory: ${{ env.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node & Angular
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # - run: npm run test:headless
      - run: npm run build
      - name: Upload browser artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: browser-dist
          path: solthoth/dist/solthoth/browser/
          retention-days: 1

  infra:
    name: Infrastructure
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: bit-and-byte-ideas/azure-static-webapp-cicd-kit/.github/workflows/opentofu.yml@main
    with:
      working_directory: infra
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_BACKEND_RESOURCE_GROUP: ${{ secrets.TF_BACKEND_RESOURCE_GROUP }}
      TF_BACKEND_STORAGE_ACCOUNT: ${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}
      TF_BACKEND_CONTAINER: ${{ secrets.TF_BACKEND_CONTAINER }}
      TF_BACKEND_KEY: ${{ secrets.TF_BACKEND_KEY }}

  deploy:
    name: Deploy to Azure Static Web App
    runs-on: ubuntu-latest
    needs: [build, infra]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Download browser artifact
        uses: actions/download-artifact@v4
        with:
          name: browser-dist
          path: dist/
      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: dist/
          skip_app_build: true

name: Build and Test
run-name: ${{ github.actor }} is building ProfileSite
on: [push, pull_request]
jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install commitlint dependencies
        run: |
          cd solthoth
          npm ci
      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
      - name: Validate current commit (push)
        if: github.event_name == 'push'
        run: npx commitlint --from HEAD~1 --to HEAD --verbose

  build:
    runs-on: ubuntu-latest
    env:
      working-directory: ./solthoth
    defaults:
      run:
        working-directory: ${{ env.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node & Angular
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # - run: npm run test:headless
      - run: npm run build
      - name: Upload browser files
        uses: actions/upload-artifact@v4
        with:
          name: browser_profile_ftp
          path: ${{ github.workspace }}/solthoth/dist/solthoth/browser/
          if-no-files-found: error
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download browser files
        uses: actions/download-artifact@v4
        with:
          name: browser_profile_ftp
      # https://github.com/marketplace/actions/ftp-deploy
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
